{{define "content"}}
<div class="login-wrap">
  <p style="text-align:center;font-size:2.5rem;color:var(--red);margin:0">ॐ</p>
  <h1>Yogilib</h1>
  <p style="text-align:center;color:var(--muted);margin-top:-.5rem;font-size:1.05rem">व्यवस्थापक पहुँच</p>

  {{if .Error}}<div class="flash flash-err">{{.Error}}</div>{{end}}

  <form class="login-form" method="POST" action="/login">
    <div class="form-group">
      <label for="email">इमेल</label>
      <input type="email" id="email" name="email" required autocomplete="username">
    </div>
    <div class="form-group">
      <label for="password">पासवर्ड</label>
      <input type="password" id="password" name="password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn btn-primary login-btn">प्रवेश गर्नुहोस्</button>
  </form>
</div>
{{end}}
