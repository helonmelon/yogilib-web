app = 'yogilib'
primary_region = 'sin'

[build]

[env]
  PORT = "8080"
  DB_PATH = "/data/yogilib.db"

[mounts]
  source = 'yogilib_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
